server:
  port: 8090

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: lb://user-service
            predicates:
              - Path=/auth/**, /users/**
          - id: demande-service
            uri: lb://demande-service
            predicates:
              - Path=/demandes/**

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:eureka-server}:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG