server:
  port: 8081

spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: "mongodb://${MONGO_HOST:mongodb}:27017/user"

eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_HOST:eureka-server}:8761/eureka/"
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG