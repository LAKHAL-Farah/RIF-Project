server:
  port: 8081

spring:
  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:8888
  application:
    name: user-service
  data:
    mongodb:
      uri: "mongodb://${MONGO_HOST:mongodb}:27017/user"

eureka:
  client:
    service-url:
      defaultZone: "http://${EUREKA_HOST:eureka-server}:8761/eureka/"

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days


